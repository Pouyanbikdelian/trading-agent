# docker-compose for the trading agent + IB Gateway.
#
# Usage (paper trading; default):
#   docker compose up -d
#
# Usage (live trading — requires .env with TRADING_ENV=live + ALLOW_LIVE_TRADING=true):
#   docker compose --profile live up -d
#
# Daily ops:
#   docker compose logs -f trader            # follow the runner
#   docker compose exec trader trading status
#   docker compose restart trader            # safe; halt state + cache survive
#   docker compose down                      # stop both containers
#
# Reliability sidecars (added 2026-05-22):
#   * autoheal     — watches healthchecks; restarts unhealthy containers
#   * scheduler    — ofelia cron; nightly gateway restart at 23:30 UTC
# Both run unattended. The gateway's session can go stale silently
# (Error 1100 / API hangs) and these together keep the system honest
# without operator intervention.
#
# Volumes live in named docker volumes by default so a `compose down -v` is
# the one explicit "wipe everything" command. Switch to bind mounts on the
# VPS (./data, ./logs, ./state) when you want them visible from the host.

# Docker log rotation — applied to every service via the YAML anchor below.
# Without this, container stdout grows unbounded under /var/lib/docker and
# eventually fills the disk. 10MB × 3 files = ~30MB ceiling per container.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  ib-gateway:
    # gnzsnz's image is the maintained community IB Gateway in Docker. It
    # boots TWS in headless mode and exposes port 4002 (paper) / 4001 (live).
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: ibkr-gateway
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      # TCP probe on the API port. Catches hard hangs where the gateway
      # container is up but its socket no longer accepts connections.
      # Does NOT catch "port up but IB session dead" — for that we rely
      # on (1) the trader's auto-reconnect inside _bounded, and (2) the
      # nightly scheduled restart below.
      #
      # bash + /dev/tcp avoids requiring nc/netcat in the gateway image.
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/127.0.0.1/4002' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      # Gateway takes ~60-90s to fully boot (login + auth + config dialog).
      # start_period suppresses healthcheck failures during that window.
      start_period: 180s
    labels:
      # Opt the gateway into autoheal — when the healthcheck above fires
      # `unhealthy` 3 times in a row, autoheal will `docker restart` this
      # container. Other services don't have this label so they aren't
      # auto-restarted (only the gateway flakes badly enough to need it).
      - "autoheal=true"
      # Nightly self-restart at 23:30 UTC via the ofelia scheduler. Long
      # after US close (21:00 UTC), well before the Friday cycle (21:05).
      # Wait — 23:30 IS after 21:05, so a Friday restart wouldn't disrupt
      # this week's cycle. Picks a fresh IB session before next week.
      - "ofelia.enabled=true"
      - "ofelia.job-exec.nightly-restart.schedule=0 30 23 * * *"
      # `kill 1` makes the container exit immediately; restart: unless-stopped
      # then brings it back, going through the IBC login dance fresh. We tried
      # `docker restart` from outside, but exec'ing a SIGTERM inside is simpler.
      - "ofelia.job-exec.nightly-restart.command=/bin/sh -c \"kill 1\""
    # HOST NETWORKING for the gateway.
    # Docker port-forwards do NAT — when a host-net trader connects to
    # 127.0.0.1:4002, the kernel rewrites the source to the docker bridge
    # gateway before delivering inside the bridged gateway container. So
    # the gateway sees a 172.x.x.x source, fails the TrustedIPs check
    # (default = 127.0.0.1 only), and the API handshake hangs forever.
    #
    # Putting BOTH the gateway and the trader on host networking gives
    # them the same network namespace: trader's loopback connection
    # arrives on the gateway's loopback socket with src=127.0.0.1, which
    # IS trusted by default. UFW already blocks ports 4001/4002/5900 from
    # external IPs, so host networking doesn't widen our exposure.
    network_mode: host
    environment:
      # The image reads these on startup. .env must define them.
      TWS_USERID: ${IBKR_USERNAME}
      TWS_PASSWORD: ${IBKR_PASSWORD}
      TRADING_MODE: ${IBKR_TRADING_MODE:-paper}    # 'paper' or 'live'
      READ_ONLY_API: "no"
      TIME_ZONE: ${TZ:-UTC}
      # 2FA: IBKR's gateway falls back to mobile auth; keep IBC alive long enough.
      TWOFA_TIMEOUT_ACTION: "restart"
      # Bypass the "running outside the live system" warning at startup.
      BYPASS_WARNING: "yes"
    volumes:
      - ib_settings:/home/ibgateway/Jts

  trader:
    build:
      context: .
      dockerfile: Dockerfile
    image: trading-agent:latest
    container_name: trader
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - ib-gateway
    env_file:
      - .env
    labels:
      # Ofelia scheduler picks these up and exec's them inside the trader
      # container at the listed cadence. All disk hygiene — keeps long-
      # running deployments from accumulating cruft. None of these touch
      # trading-critical state (orders.db, halt.json, snapshot) — just
      # the audit/audit-adjacent stuff that grows unbounded.
      - "ofelia.enabled=true"
      # Daily 23:45 UTC: prune executed-command JSONs older than 14 days.
      # Each /buy / /cycle / /balances leaves one of these; uncapped it
      # grows by ~MB/month per active operator.
      - "ofelia.job-exec.prune-executed.schedule=0 45 23 * * *"
      - 'ofelia.job-exec.prune-executed.command=/bin/sh -c "find /app/state/commands/executed -type f -name ''*.json'' -mtime +14 -delete 2>/dev/null; echo prune-executed: $(find /app/state/commands/executed -type f 2>/dev/null | wc -l) files remaining"'
      # Weekly Sunday 04:00 UTC: vacuum the SQLite stores so deleted
      # rows actually reclaim disk. Without VACUUM, SQLite holds
      # tombstoned pages indefinitely — annoying for the long tail.
      - "ofelia.job-exec.sqlite-vacuum.schedule=0 0 4 * * SUN"
      # NOTE on $$db: docker-compose expands $vars from the environment
      # before the container ever sees the command. $$ escapes to a literal
      # $ so the shell inside the trader interprets $db as a loop variable.
      - 'ofelia.job-exec.sqlite-vacuum.command=/bin/sh -c "for db in /app/state/runner.db /app/state/orders.db; do [ -f \"$$db\" ] && python -c \"import sqlite3,sys; sqlite3.connect(sys.argv[1]).execute(''VACUUM'')\" \"$$db\" && echo vacuumed $$db; done"'
    # HOST NETWORKING: the trader connects to IB Gateway via 127.0.0.1.
    # Why not the docker bridge network: IB Gateway's TrustedIPs default
    # is 127.0.0.1 only. Connections from the docker bridge subnet
    # (172.18.x.x) trigger a manual-confirmation dialog server-side that
    # blocks the API handshake. Putting the trader on host network sidesteps
    # the dialog entirely — connections appear FROM 127.0.0.1, which IS
    # trusted. Also bumps connect reliability.
    network_mode: host
    environment:
      IBKR_HOST: 127.0.0.1
      # 4001 = live, 4002 = paper. We pick the right port based on the
      # mode the gateway booted in.
      IBKR_PORT: ${IBKR_PORT:-4002}
    volumes:
      - data:/app/data
      - logs:/app/logs
      - state:/app/state
      # Mount config/ read-only so universes.yaml + risk.yaml are editable
      # from the host without rebuilding.
      - ./config:/app/config:ro
      # Docker socket access: the trader is the only process that can
      # tell when the IBKR API session is dead (port alive but calls
      # hang). When that happens it issues `docker restart ibkr-gateway`
      # so the next cycle lands on a fresh session — no operator needed.
      # Set ENABLE_GATEWAY_AUTO_RESTART=false in .env to disable.
      - /var/run/docker.sock:/var/run/docker.sock
    # The trader runs as uid 10001 (non-root). The docker socket is owned
    # by root:docker on the host (mode 660). Without supplementing the
    # trader process with the host's docker GID we get EACCES on open.
    # group_add accepts a numeric GID without requiring the group to
    # exist in the container's /etc/group. Find your host GID with
    #   stat -c %g /var/run/docker.sock
    # and set DOCKER_GID in .env. Default 999 covers most Debian hosts;
    # Ubuntu commonly uses 998.
    group_add:
      - "${DOCKER_GID:-999}"
    # Override CMD here so the image's default ("status") doesn't apply.
    # --use-ibkr routes fills through IB Gateway in paper mode so positions
    # land in the real IBKR paper account. Refuses to start if IBKR_PORT=4001
    # (live) — defense-in-depth against pointing the paper runner at live.
    #
    # PAPER NOTE: -p rebalance=${REBALANCE:-5} forces weekly basket rotation
    # for paper-trading (catch bugs faster, verify the order pipeline more
    # often). Live keeps the strategy's quarterly default (63 bars) — set
    # REBALANCE=63 in .env or remove the -p flag for the live profile.
    command: ["paper", "run", "${UNIVERSE:-us_large_cap}",
              "--strategy", "${STRATEGY:-donchian}",
              "--cron", "${CRON:-0 16 * * MON-FRI}",
              "--tz",   "${TZ:-UTC}",
              "-p", "rebalance=${REBALANCE:-5}",
              "--use-ibkr"]
    # NB: network_mode: host is incompatible with the `networks` key,
    # so we omit it for the trader. The bot still uses the trading
    # network for clean inter-container isolation (it doesn't talk to
    # IB Gateway).

  # Telegram command bot. Long-poll only — no inbound ports. Reads/writes
  # the same state/ volume as the runner so /halt and /resume are honoured
  # by the next cycle. Optional: omit if TELEGRAM_BOT_TOKEN is unset.
  bot:
    image: trading-agent:latest
    container_name: trader-bot
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - trader
    env_file:
      - .env
    volumes:
      - state:/app/state
      - logs:/app/logs
      # Read-only access to the parquet price cache so /signal,
      # /candidates and any other "what does the strategy see"
      # commands can run without bouncing through the trader. The
      # trader is the only writer; mounting `:ro` here guarantees the
      # bot can't corrupt the cache.
      - data:/app/data:ro
      # Same for config/ so /signal can resolve UNIVERSE -> symbols.
      - ./config:/app/config:ro
    command: ["bot", "run"]
    networks:
      - trading

  # Live dashboard: read-only view over state/data, basic-auth protected.
  # Reachable at http://<vps-ip>:8787 after `ufw allow 8787/tcp`.
  # Requires DASHBOARD_PASS in .env (refuses to start without it).
  dashboard:
    image: trading-agent:latest
    container_name: trader-dashboard
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - trader
    env_file:
      - .env
    environment:
      # The read-only live-account mirror (profile `mirror` below) writes
      # snapshots here; when the dir has a runner.db the dashboard's Live
      # tab renders it as its own sleeve — never merged with paper.
      DASHBOARD_LIVE_STATE_DIR: /app/state_live
    volumes:
      - state:/app/state
      - state_live:/app/state_live:ro
      - data:/app/data:ro
      - ./config:/app/config:ro
    ports:
      - "8787:8787"
    command: ["dashboard", "run"]
    networks:
      - trading

  # ---- Read-only LIVE-account mirror (opt-in) ---------------------------
  # Shows the REAL account on the dashboard before/without trading it.
  # Activate:   docker compose --profile mirror up -d
  # Deactivate: docker compose --profile mirror down ib-gateway-live mirror
  #
  # BEFORE enabling, check RAM — the box has 2GB and a second gateway
  # needs ~500-700MB:   free -m   (want >700MB free + swap configured).
  #
  # Requires in .env:  IBKR_LIVE_USERNAME (the live login; the paper one
  # without the trailing "2"). Password is shared with the paper login.
  # First start (and each nightly gateway restart) may ping IBKR mobile
  # 2FA — approve it on the phone or the gateway sits at the login screen.
  #
  # Safety stack, outermost first:
  #   1. READ_ONLY_API=yes — IBKR itself refuses order calls on this session.
  #   2. `trading mirror run` only ever calls get_account() + save_snapshot().
  #   3. Own state volume — the paper runner's state/orders are untouched.
  #   4. Own client_id (27) — never shares the trader's API identity.
  ib-gateway-live:
    profiles: ["mirror"]
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: ibkr-gateway-live
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      # Live-mode gateway listens on 4001 inside the container.
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/127.0.0.1/4001' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 180s
    labels:
      - "autoheal=true"
      # Nightly restart 23:35 UTC — 5 min after the paper gateway's so the
      # two IBC login dances (and possible 2FA pings) don't overlap.
      - "ofelia.enabled=true"
      - "ofelia.job-exec.nightly-restart-live.schedule=0 35 23 * * *"
      - "ofelia.job-exec.nightly-restart-live.command=/bin/sh -c \"kill 1\""
    # BRIDGE network, unlike the paper gateway. Two gateways can't share
    # host networking: with a shared network namespace the second Xvfb
    # collides with the first's X display socket (seen 2026-07-09,
    # "Cannot establish any listening sockets"). On the bridge the image's
    # built-in socat relay (port 4003 → 127.0.0.1:4001) lets the mirror
    # connect from another container while the gateway still sees a
    # trusted 127.0.0.1 source — TrustedIPs stays happy.
    networks:
      - trading
    environment:
      TWS_USERID: ${IBKR_LIVE_USERNAME}
      TWS_PASSWORD: ${IBKR_PASSWORD}
      TRADING_MODE: live
      READ_ONLY_API: "yes"
      TIME_ZONE: ${TZ:-UTC}
      TWOFA_TIMEOUT_ACTION: "restart"
      BYPASS_WARNING: "yes"
    volumes:
      - ib_settings_live:/home/ibgateway/Jts

  mirror:
    profiles: ["mirror"]
    image: trading-agent:latest
    container_name: trader-mirror
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - ib-gateway-live
    env_file:
      - .env
    networks:
      - trading
    environment:
      # 4003 = the live gateway's socat relay (see ib-gateway-live note);
      # the relay delivers us to the gateway as 127.0.0.1, which is the
      # only source its TrustedIPs default accepts.
      IBKR_HOST: ib-gateway-live
      IBKR_PORT: "4003"
      IBKR_CLIENT_ID: "27"
    volumes:
      - state_live:/app/state
    command: ["mirror", "run"]

  # Live profile flips the command. Activate with `--profile live`.
  trader-live:
    profiles: ["live"]
    image: trading-agent:latest
    container_name: trader-live
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - ib-gateway
    env_file:
      - .env
    environment:
      IBKR_HOST: ib-gateway
      IBKR_PORT: ${IBKR_PORT:-4001}
      TRADING_ENV: live
      ALLOW_LIVE_TRADING: "true"
    volumes:
      - data:/app/data
      - logs:/app/logs
      - state:/app/state
      - ./config:/app/config:ro
    command: ["live", "run", "${UNIVERSE:-us_large_cap}",
              "--strategy", "${STRATEGY:-donchian}",
              "--cron", "${CRON:-0 16 * * MON-FRI}",
              "--tz",   "${TZ:-UTC}"]
    networks:
      - trading

  # Autoheal: watches every container with `autoheal=true` label. When a
  # container's docker healthcheck reports "unhealthy" 3 times in a row,
  # autoheal runs `docker restart` on it. The gateway is the only opt-in
  # container — its API session goes stale randomly and this lifts the
  # operator out of the recovery loop.
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    restart: always
    logging: *default-logging
    environment:
      # Watch only containers explicitly labeled `autoheal=true`. Safer than
      # `AUTOHEAL_CONTAINER_LABEL=all` which would also restart the trader
      # if its healthcheck (which is internal to our code) ever flapped.
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 30
      AUTOHEAL_START_PERIOD: 60
    volumes:
      # Docker socket access is required so the sidecar can issue
      # `docker restart`. Read-write because restart is a mutation.
      - /var/run/docker.sock:/var/run/docker.sock

  # Ofelia: cron-style scheduler with native docker integration. Reads job
  # definitions from labels on other containers (see ib-gateway above) and
  # executes them on schedule. We use it for the nightly gateway restart.
  scheduler:
    image: mcuadros/ofelia:latest
    container_name: scheduler
    restart: always
    logging: *default-logging
    command: ["daemon", "--docker"]
    volumes:
      # Read-only socket access is enough for ofelia — it exec's commands
      # in labelled containers but doesn't start/stop them.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - ib-gateway

volumes:
  ib_settings: {}
  ib_settings_live: {}
  data: {}
  logs: {}
  state: {}
  # The live mirror's snapshots — separate from paper state by design.
  state_live: {}

networks:
  trading:
    driver: bridge
